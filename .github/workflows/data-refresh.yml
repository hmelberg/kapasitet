name: Data Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

jobs:
  validate-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate CSV data
        run: npm run validate:data
